<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>插入排序動畫</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        #container {
            display: flex;
            align-items: flex-end;
            height: 300px;
            width: 80%;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .bar {
            background-color: #4CAF50;
            margin: 0 2px;
            width: 20px;
            transition: height 0.3s, background-color 0.3s;
        }
        .bar.active {
            background-color: #f44336;
        }
        .bar.insert {
            background-color: #ff9800;
        }
        #inputContainer {
            margin-bottom: 20px;
        }
        #inputContainer input {
            width: 300px;
            padding: 5px;
        }
        #inputContainer button {
            padding: 5px 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>插入排序法 (Insertion Sort) 動畫示範</h1>
    <div id="inputContainer">
        <label for="dataInput">輸入數組元素 (用逗號分隔):</label><br>
        <input type="text" id="dataInput" placeholder="例如: 64,34,25,12,22,11,90">
        <button id="updateBtn">更新數組</button>
    </div>
    <div id="container"></div>
    <button id="start">開始排序</button>
    <script>
        const container = document.getElementById('container');
        const startBtn = document.getElementById('start');
        const updateBtn = document.getElementById('updateBtn');
        const dataInput = document.getElementById('dataInput');

        let data = [64, 34, 25, 12, 22, 11, 90];

        function renderBars() {
            container.innerHTML = '';
            data.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = (value * 2) + 'px';
                bar.setAttribute('data-index', index);
                container.appendChild(bar);
            });
        }

        updateBtn.addEventListener('click', () => {
            const input = dataInput.value.trim();
            if (input) {
                const newData = input.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                if (newData.length > 0) {
                    data = newData;
                    renderBars();
                } else {
                    alert('請輸入有效的數字，用逗號分隔。');
                }
            }
        });

        async function insertionSortAnimation() {
            const bars = container.children;
            const n = data.length;

            for (let i = 1; i < n; i++) {
                let key = data[i];
                let j = i - 1;

                bars[i].classList.add('insert');
                await sleep(300);

                while (j >= 0 && data[j] > key) {
                    bars[j].classList.add('active');
                    bars[j + 1].classList.add('active');
                    await sleep(300);

                    data[j + 1] = data[j];
                    bars[j + 1].style.height = (data[j + 1] * 2) + 'px';

                    bars[j].classList.remove('active');
                    bars[j + 1].classList.remove('active');
                    j--;
                }

                data[j + 1] = key;
                bars[j + 1].style.height = (key * 2) + 'px';

                bars[i].classList.remove('insert');

                if (j + 1 !== i) {
                    bars[j + 1].classList.add('insert');
                    await sleep(300);
                    bars[j + 1].classList.remove('insert');
                }
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            await insertionSortAnimation();
            startBtn.disabled = false;
        });

        dataInput.value = data.join(',');
        renderBars();
    </script>
</body>
</html>
